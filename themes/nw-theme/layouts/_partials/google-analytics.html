{{- if and (not hugo.IsServer) .Site.Params.googleAnalytics }}
{{- if not (in .Site.Params.googleAnalytics " ") }}
<!-- Google Analytics 4 - Performance Optimized -->
<script>
(function() {
  // 延迟加载 GA，确保不影响页面渲染
  var loadGA = function() {
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    window.gtag = gtag;
    gtag('js', new Date());
    gtag('config', '{{ .Site.Params.googleAnalytics }}');
    
    // 动态加载 GA 脚本
    var script = document.createElement('script');
    script.async = true;
    script.src = 'https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.googleAnalytics }}';
    
    // 错误处理：如果 GA 加载失败，不影响网站
    script.onerror = function() {
      console.warn('Google Analytics failed to load');
    };
    
    document.head.appendChild(script);
  };
  
  // 使用 requestIdleCallback 在浏览器空闲时加载
  if ('requestIdleCallback' in window) {
    requestIdleCallback(loadGA, { timeout: 2000 });
  } else {
    // 降级方案：页面加载完成后延迟加载
    window.addEventListener('load', function() {
      setTimeout(loadGA, 1);
    });
  }
})();
</script>
{{- end }}
{{- end -}}
